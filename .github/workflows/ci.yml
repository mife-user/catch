name: CI

on:
  push:
    branches: [main, master, develop]
    tags-ignore:
      - 'v*'  # 忽略 tag 推送，避免与 release workflow 冲突
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: 下载依赖
        run: go mod download

      - name: 运行测试
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  benchmark:
    name: 基准测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: 运行基准测试
        run: go test -bench=. -benchmem -run=^$ ./internal/search

  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: 运行 golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

  build:
    name: 构建 (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: catch-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact_name: catch-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact_name: catch-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: catch-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: catch-windows-amd64.exe
          - os: windows-latest
            goos: windows
            goarch: arm64
            artifact_name: catch-windows-arm64.exe

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: 下载依赖
        run: go mod download

      - name: 构建
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact_name }} ./cmd/catch

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 7
