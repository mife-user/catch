name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: 发布 ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: 下载依赖
        run: go mod download

      - name: 运行测试
        run: go test -v -race ./...

      - name: 构建所有平台
        run: |
          mkdir -p dist
          
          echo "Building for Windows amd64..."
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/catch-windows-amd64.exe ./cmd/catch
          
          echo "Building for Windows arm64..."
          GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o dist/catch-windows-arm64.exe ./cmd/catch
          
          echo "Building for macOS amd64..."
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/catch-darwin-amd64 ./cmd/catch
          
          echo "Building for macOS arm64..."
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/catch-darwin-arm64 ./cmd/catch
          
          echo "Building for Linux amd64..."
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/catch-linux-amd64 ./cmd/catch
          
          echo "Building for Linux arm64..."
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/catch-linux-arm64 ./cmd/catch
          
          echo "Generating checksums..."
          cd dist
          sha256sum * > checksums.txt
          
          echo "Build complete. Files:"
          ls -lh dist/

      - name: 提取 Release Notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Extracting notes for version: $VERSION"
          
          # 尝试从 CHANGELOG.md 提取
          if grep -q "## \[v${VERSION}\]" CHANGELOG.md; then
            # 提取版本之间的内容
            sed -n "/## \[v${VERSION}\]/,/## \[/p" CHANGELOG.md | sed '$d' > RELEASE_NOTES.md
            echo "Successfully extracted release notes"
          else
            echo "Release ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
            echo "⚠️  Release notes not found in CHANGELOG.md, using default" >> RELEASE_NOTES.md
            echo "Warning: Release notes not found, using default"
          fi
          
          echo "Release notes content:"
          cat RELEASE_NOTES.md

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/catch-windows-amd64.exe
            dist/catch-windows-arm64.exe
            dist/catch-darwin-amd64
            dist/catch-darwin-arm64
            dist/catch-linux-amd64
            dist/catch-linux-arm64
            dist/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
