name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: 发布 ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: 下载依赖
        run: go mod download

      - name: 运行测试
        run: go test -v -race ./...

      - name: 构建所有平台
        run: |
          mkdir -p dist
          
          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/catch-windows-amd64.exe ./cmd/catch
          GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o dist/catch-windows-arm64.exe ./cmd/catch
          
          # macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/catch-darwin-amd64 ./cmd/catch
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/catch-darwin-arm64 ./cmd/catch
          
          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/catch-linux-amd64 ./cmd/catch
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/catch-linux-arm64 ./cmd/catch
          
          # 生成 checksum
          cd dist
          sha256sum * > checksums.txt

      - name: 提取 Release Notes
        id: release_notes
        run: |
          # 从 CHANGELOG.md 提取当前版本的更新日志
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk "/## \[v${VERSION}\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md)
          
          # 如果提取失败，使用默认文本
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          
          # 保存到文件
          echo "$NOTES" > RELEASE_NOTES.md
          
          # 设置输出
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/catch-windows-amd64.exe
            dist/catch-windows-arm64.exe
            dist/catch-darwin-amd64
            dist/catch-darwin-arm64
            dist/catch-linux-amd64
            dist/catch-linux-arm64
            dist/checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
