name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
    - name: Build Linux
      run: GOOS=linux GOARCH=amd64 go build -o catch-linux-amd64 ./cmd/catch
    - name: Build Windows
      run: GOOS=windows GOARCH=amd64 go build -o catch-windows-amd64 ./cmd/catch
    - name: Build macOS
      run: GOOS=darwin GOARCH=amd64 go build -o catch-macos-amd64 ./cmd/catch
    - name: GH Release
      uses: softprops/action-gh-release@v3.0.0
      with:
        name: ${{ github.ref_name }}
        body: |
          ${{github.event.head_commit.message}}
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          catch-linux-amd64
          catch-windows-amd64
          catch-macos-amd64
      
      
       
