name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      with: actions/checkout@v6
    - name: Build
      run: go build 
    - name: GH Release
      uses: softprops/action-gh-release@v3.0.0
      
       
