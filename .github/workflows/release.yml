name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
    - name: Build Linux
      run: go build -o catch ./catch
    - name: GH Release
      uses: softprops/action-gh-release@v3.0.0
      
       
